<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme Corp. | Pretend Enterprise Solutions</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-nav">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-square">P</div>
                <span class="logo-name">Acme Corp.</span>
            </div>
            <nav class="nav-links">
                <div class="dropdown">
                    <button class="nav-item dropbtn">Solutions<span class="chevron"></span></button>
                    <div class="dropdown-content">
                        <a href="#">Enterprise</a>
                        <a href="#">Platform</a>
                    </div>
                </div>
                <a href="#" class="nav-item">Resources</a>
            </nav>
            <div class="pretend-auth-actions">
                <button class="btn-text" id="btn-top-first">Log in</button>
                <button class="btn-filled" id="btn-top-second">Get started</button>
            </div>
        </div>
    </header>

    <main class="viewport">
        <section class="hero-input-section">
            <h1 class="headline">Write something testable</h1>
            <p class="sub-headline">Your text will disappear when clicking send button</p>
            
            <div class="input-wrapper">
                <input type="text" id="mainInput" placeholder="Start typing...">
                <button id="sendBtn" class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </section>
    </main>

    <div class="cookie-banner" id="cookieBanner">
        <p>We pretend to use cookies with this cookie banner.</p>
        <div class="banner-actions">
            <button class="btn-outline clickable-ui">Button 1</button>
            <button class="btn-dark clickable-ui">Button 2</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
